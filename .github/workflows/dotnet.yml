name: .NET Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore dupcheck/dupcheck.sln

      - name: Build
        run: dotnet build dupcheck/dupcheck.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test dupcheck/dupcheck.sln --no-build --configuration Release --verbosity normal

      - name: Publish (win-x64 single-file exe)
        run: >
          dotnet publish dupcheck/src/dupcheck/dupcheck.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dupcheck-win-x64
          path: ./publish/dupcheck.exe
